name: Build iOS App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:        # 允许在 GitHub 网页上手动触发
    inputs:
      signing:
        description: '是否启用签名（需预先配置 Secrets）'
        type: boolean
        default: false

jobs:
  # ============================================================
  # Job 1: 编译验证（无签名，始终运行）
  # ============================================================
  build-only:
    name: Build (编译验证)
    runs-on: macos-latest     # Apple Silicon macOS runner，内置 Xcode
    timeout-minutes: 30

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 XcodeGen
        run: brew install xcodegen

      - name: 生成 Xcode 项目
        run: |
          xcodegen generate
          echo "✅ .xcodeproj 已生成"

      - name: 查看可用 Xcode 版本
        run: xcodebuild -version

      - name: 编译 (Build)
        run: |
          xcodebuild \
            -project njupt_ios.xcodeproj \
            -scheme njupt_ios \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -destination 'generic/platform=iOS' \
            build 2>&1 | tee build.log

      - name: 检查编译结果
        run: |
          if grep -q "BUILD SUCCEEDED" build.log; then
            echo "✅ 编译成功！"
          else
            echo "❌ 编译失败，请检查上方日志"
            exit 1
          fi

      - name: 打包 .app 产物
        run: |
          APP_PATH=$(find DerivedData/Build/Products/Release-iphoneos -name "*.app" -type d | head -1)
          if [ -d "$APP_PATH" ]; then
            echo "发现 App: $APP_PATH"
            zip -r njupt_ios_unsigned.zip "$APP_PATH"
            echo "✅ 已打包为 njupt_ios_unsigned.zip"
          else
            echo "⚠️ 未找到 .app 产物（这通常是因为没有签名导致的）"
          fi

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: njupt_ios_unsigned
          path: njupt_ios_unsigned.zip
          if-no-files-found: warn

  # ============================================================
  # Job 2: 签名构建（需要配置 GitHub Secrets，手动触发）
  # ============================================================
  build-signed:
    name: Build & Sign (签名构建)
    runs-on: macos-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.signing == 'true'

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 XcodeGen
        run: brew install xcodegen

      - name: 生成 Xcode 项目
        run: xcodegen generate

      # ---- 导入签名证书 ----
      - name: 导入 Apple 开发证书
        env:
          P12_CERTIFICATE_BASE64: ${{ secrets.P12_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          echo "$P12_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: 安装 Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      # ---- Archive + Export IPA ----
      - name: 归档 (Archive)
        run: |
          xcodebuild archive \
            -project njupt_ios.xcodeproj \
            -scheme njupt_ios \
            -sdk iphoneos \
            -archivePath DerivedData/Archive/njupt_ios.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.DEVELOPMENT_TEAM }} \
            CODE_SIGN_IDENTITY="iPhone Developer" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_NAME }}" \
            archive

      - name: 导出 IPA
        run: |
          cat > exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>teamID</key>
              <string>${{ secrets.DEVELOPMENT_TEAM }}</string>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath DerivedData/Archive/njupt_ios.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath DerivedData/IPA

      - name: 上传签名 IPA
        uses: actions/upload-artifact@v4
        with:
          name: njupt_ios_signed
          path: DerivedData/IPA/*.ipa
          if-no-files-found: error
