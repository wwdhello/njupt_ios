name: Build iOS App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build (模拟器编译验证)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 XcodeGen
        run: brew install xcodegen

      - name: 查看环境
        run: |
          echo "=== Xcode ===" && xcodebuild -version
          echo "=== Swift ===" && swift --version
          echo "=== XcodeGen ===" && xcodegen --version

      - name: 生成 Xcode 项目
        run: |
          xcodegen generate --spec project.yml
          echo "---"
          xcodebuild -project njupt_ios.xcodeproj -list

      - name: 编译 (模拟器)
        run: |
          xcodebuild \
            -project njupt_ios.xcodeproj \
            -scheme njupt_ios \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath DerivedData \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee build.log

      - name: 编译结果
        run: |
          if grep -qE "\*\* BUILD SUCCEEDED" build.log; then
            echo "✅ 编译成功！"
          else
            echo "❌ 编译失败！错误："
            grep -nE "error:|fatal error:" build.log || echo "(未找到 error 行，可能是 XcodeGen 或配置问题)"
            echo ""
            echo "=== 警告 ==="
            grep -nE "warning:" build.log | tail -20 || echo "(无警告)"
            exit 1
          fi
