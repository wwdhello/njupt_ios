name: Build iOS App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:        # 允许在 GitHub 网页上手动触发
    inputs:
      signing:
        description: '构建类型'
        type: choice
        default: 'simulator'
        options:
          - 'simulator'       # 编译验证（无需签名，总是成功）
          - 'signed_device'   # 签名设备构建（需预先配置 Secrets）

jobs:
  # ============================================================
  # Job: 模拟器编译验证（无签名，每次推送自动运行）
  # ============================================================
  build-simulator:
    name: Build (模拟器编译验证)
    runs-on: macos-latest
    timeout-minutes: 30
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.signing == 'simulator'

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 XcodeGen
        run: brew install xcodegen

      - name: 查看 Xcode 版本
        run: xcodebuild -version

      - name: 生成 Xcode 项目
        run: |
          xcodegen generate
          echo "✅ .xcodeproj 已生成"
          # 检查 scheme 是否正确生成
          xcodebuild -project njupt_ios.xcodeproj -list

      - name: 编译 (模拟器)
        run: |
          xcodebuild \
            -project njupt_ios.xcodeproj \
            -scheme njupt_ios \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath DerivedData \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee build.log

      - name: 检查编译结果
        run: |
          if grep -qE "BUILD (SUCCEEDED|SUCCESS)" build.log; then
            echo "✅ 编译成功！代码无语法错误。"
            echo ""
            echo "📱 下一步：要安装到 iPhone，请："
            echo "   1. 在 GitHub Actions 页面手动触发 'Build iOS App'"
            echo "   2. 选择 'signed_device'"
            echo "   3. 确保已配置 Apple 签名 Secrets"
            echo "   或使用 AltStore / SideStore 侧载"
          else
            echo "❌ 编译失败！"
            echo "=== 错误摘要 ==="
            grep -E "error:|fatal error:" build.log || true
            exit 1
          fi

  # ============================================================
  # Job: 签名设备构建（需配置 Secrets，手动触发）
  # ============================================================
  build-signed:
    name: Build & Sign (设备 IPA)
    runs-on: macos-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.signing == 'signed_device'

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 XcodeGen
        run: brew install xcodegen

      - name: 查看 Xcode 版本
        run: xcodebuild -version

      - name: 生成 Xcode 项目
        run: |
          xcodegen generate
          echo "✅ .xcodeproj 已生成"

      - name: 导入 Apple 开发证书
        env:
          P12_CERTIFICATE_BASE64: ${{ secrets.P12_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          echo "$P12_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: 安装 Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: 归档 (Archive)
        run: |
          xcodebuild archive \
            -project njupt_ios.xcodeproj \
            -scheme njupt_ios \
            -sdk iphoneos \
            -archivePath DerivedData/Archive/njupt_ios.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.DEVELOPMENT_TEAM }} \
            CODE_SIGN_IDENTITY="iPhone Developer" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_NAME }}" \
            archive 2>&1 | tee archive.log

      - name: 导出 IPA
        run: |
          cat > exportOptions.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>teamID</key>
              <string>${DEVELOPMENT_TEAM}</string>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          PLISTEOF
          # 替换环境变量
          sed -i '' "s/\${DEVELOPMENT_TEAM}/${{ secrets.DEVELOPMENT_TEAM }}/g" exportOptions.plist

          xcodebuild -exportArchive \
            -archivePath DerivedData/Archive/njupt_ios.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath DerivedData/IPA 2>&1 | tee export.log

      - name: 上传签名 IPA
        uses: actions/upload-artifact@v4
        with:
          name: njupt_ios_signed.ipa
          path: DerivedData/IPA/*.ipa
          if-no-files-found: error
