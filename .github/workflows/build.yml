name: Build iOS App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build (真机版本)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 XcodeGen
        run: brew install xcodegen

      - name: 查看环境
        run: |
          echo "=== Xcode ===" && xcodebuild -version
          echo "=== Swift ===" && swift --version

      - name: 生成 Xcode 项目
        run: |
          xcodegen generate --spec project.yml
          xcodebuild -project njupt_ios.xcodeproj -list

      - name: 编译 (真机, 无签名)
        run: |
          xcodebuild \
            -project njupt_ios.xcodeproj \
            -scheme njupt_ios \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee build.log

      - name: 编译结果
        run: |
          if grep -qE "\*\* BUILD SUCCEEDED" build.log; then
            echo "✅ 编译成功！"
          else
            echo "❌ 编译失败！错误："
            grep -nE "error:|fatal error:" build.log || echo "(未找到)"
            exit 1
          fi

      - name: 诊断 .app 结构
        run: |
          APP_PATH=$(find DerivedData/Build/Products/Release-iphoneos -name "*.app" -type d | head -1)
          echo "=== App: $APP_PATH ==="
          echo "=== 完整目录 ==="
          ls -laR "$APP_PATH"
          echo ""
          echo "=== Info.plist 是否存在 ==="
          test -f "$APP_PATH/Info.plist" && echo "✅ Info.plist OK" || echo "❌ Info.plist 缺失!"
          echo ""
          EXEC=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Info.plist" 2>/dev/null || echo "MISSING")
          echo "CFBundleExecutable = $EXEC"
          echo "=== Mach-O ==="
          otool -l "$APP_PATH/$EXEC" 2>/dev/null | grep -A3 "cmd LC_BUILD_VERSION" | head -10

      - name: 签名 + 打包 IPA
        run: |
          APP_PATH=$(find DerivedData/Build/Products/Release-iphoneos -name "*.app" -type d | head -1)
          echo "找到 App: $APP_PATH"
          # XML plist
          plutil -convert xml1 "$APP_PATH/Info.plist" 2>&1 || true
          # 方案A: codesign ad-hoc (打印错误，不吞)
          echo "=== 尝试 codesign ==="
          codesign --force --sign - "$APP_PATH" 2>&1
          # 方案B: 如果 codesign 失败，用 ldid
          if ! codesign -dvv "$APP_PATH" 2>/dev/null | grep -q "Signature"; then
            echo "codesign 未生效，尝试 ldid..."
            brew install ldid 2>&1 | tail -3
            EXEC=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Info.plist" 2>/dev/null)
            ldid -S "$APP_PATH/$EXEC" 2>&1
            echo "ldid 完成, 签名状态:"
            codesign -dvv "$APP_PATH" 2>&1 || echo "(仍无签名)"
          fi
          # 打包
          mkdir Payload
          cp -r "$APP_PATH" Payload/
          zip -r0 njupt_ios.ipa Payload/
          rm -rf Payload
          echo "✅ IPA 已打包"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: njupt_ios_unsigned
          path: njupt_ios.ipa
