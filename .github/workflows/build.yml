name: Build iOS App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build (真机版本)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 XcodeGen
        run: brew install xcodegen

      - name: 查看环境
        run: |
          echo "=== Xcode ===" && xcodebuild -version
          echo "=== Swift ===" && swift --version

      - name: 生成 Xcode 项目
        run: |
          xcodegen generate --spec project.yml
          xcodebuild -project njupt_ios.xcodeproj -list

      - name: 编译 (真机, 无签名)
        run: |
          xcodebuild \
            -project njupt_ios.xcodeproj \
            -scheme njupt_ios \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee build.log

      - name: 编译结果
        run: |
          if grep -qE "\*\* BUILD SUCCEEDED" build.log; then
            echo "✅ 编译成功！"
          else
            echo "❌ 编译失败！错误："
            grep -nE "error:|fatal error:" build.log || echo "(未找到)"
            exit 1
          fi

      - name: 诊断 .app 结构
        run: |
          APP_PATH=$(find DerivedData/Build/Products/Release-iphoneos -name "*.app" -type d | head -1)
          echo "=== App 路径: $APP_PATH ==="
          echo ""
          echo "=== 目录结构 ==="
          ls -laR "$APP_PATH" 2>/dev/null | head -80
          echo ""
          echo "=== Info.plist ==="
          cat "$APP_PATH/Info.plist" 2>/dev/null || echo "(Info.plist 不存在!)"
          echo ""
          echo "=== 可执行文件 ==="
          EXEC_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Info.plist" 2>/dev/null || echo "")
          echo "CFBundleExecutable = '$EXEC_NAME'"
          if [ -n "$EXEC_NAME" ] && [ -f "$APP_PATH/$EXEC_NAME" ]; then
            echo "✅ 可执行文件存在"
            file "$APP_PATH/$EXEC_NAME"
            echo ""
            echo "=== 架构 ==="
            lipo -info "$APP_PATH/$EXEC_NAME" 2>/dev/null || echo "lipo 不可用"
          else
            echo "❌ 可执行文件缺失: $APP_PATH/$EXEC_NAME"
          fi

      - name: 打包为 .ipa
        run: |
          APP_PATH=$(find DerivedData/Build/Products/Release-iphoneos -name "*.app" -type d | head -1)
          if [ -d "$APP_PATH" ]; then
            echo "找到 App: $APP_PATH"
            codesign --force --sign - "$APP_PATH" 2>&1 || echo "(ad-hoc 签名警告可忽略)"
            mkdir Payload
            cp -r "$APP_PATH" Payload/
            zip -ry njupt_ios.ipa Payload/
            echo "✅ 已打包"
          else
            echo "⚠️ 未找到 .app"
            exit 1
          fi

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: njupt_ios_unsigned
          path: njupt_ios.ipa
