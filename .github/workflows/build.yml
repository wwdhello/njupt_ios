name: Build iOS App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build (真机版本)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 XcodeGen
        run: brew install xcodegen

      - name: 查看环境
        run: |
          echo "=== Xcode ===" && xcodebuild -version
          echo "=== Swift ===" && swift --version

      - name: 生成 Xcode 项目
        run: |
          xcodegen generate --spec project.yml
          xcodebuild -project njupt_ios.xcodeproj -list

      - name: 编译 (真机, 无签名)
        run: |
          xcodebuild \
            -project njupt_ios.xcodeproj \
            -scheme njupt_ios \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee build.log

      - name: 编译结果
        run: |
          if grep -qE "\*\* BUILD SUCCEEDED" build.log; then
            echo "✅ 编译成功！"
          else
            echo "❌ 编译失败！错误："
            grep -nE "error:|fatal error:" build.log || echo "(未找到)"
            exit 1
          fi

      - name: 诊断 .app 结构
        run: |
          APP_PATH=$(find DerivedData/Build/Products/Release-iphoneos -name "*.app" -type d | head -1)
          echo "=== App: $APP_PATH ==="
          echo ""
          echo "=== 目录结构 ==="
          ls -laR "$APP_PATH" | head -50
          echo ""
          echo "=== Mach-O load commands ==="
          EXEC=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Info.plist" 2>/dev/null || echo "njupt_ios")
          otool -l "$APP_PATH/$EXEC" 2>/dev/null | grep -A3 -E "cmd LC_(BUILD_VERSION|VERSION_MIN)" | head -20
          echo ""
          echo "=== 签名状态 ==="
          codesign -dvv "$APP_PATH" 2>&1 || echo "(无签名)"

      - name: 打包为 .ipa
        run: |
          APP_PATH=$(find DerivedData/Build/Products/Release-iphoneos -name "*.app" -type d | head -1)
          if [ -d "$APP_PATH" ]; then
            echo "找到 App: $APP_PATH"
            # 转 XML plist (有的工具不认二进制)
            plutil -convert xml1 "$APP_PATH/Info.plist" 2>&1 || true
            # ad-hoc 签名
            codesign --force --sign - --timestamp=none "$APP_PATH" 2>&1 || true
            # 打包 (store 模式 = 不压缩)
            mkdir Payload
            cp -r "$APP_PATH" Payload/
            zip -r0 njupt_ios.ipa Payload/
          else
            echo "⚠️ 未找到 .app"
            exit 1
          fi

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: njupt_ios_unsigned
          path: njupt_ios.ipa
