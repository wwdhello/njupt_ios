name: njupt_ios

options:
  bundleIdPrefix: com.njupt.auth
  deploymentTarget:
    iOS: "16.0"
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.0"

targets:
  njupt_ios:
    type: application
    platform: iOS
    sources:
      - path: njupt_ios
    settings:
      base:
        INFOPLIST_FILE: njupt_ios/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        PRODUCT_BUNDLE_IDENTIFIER: com.njupt.auth.njupt-ios
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
